# Schema: v2. Based on kubernetes/release #2 in r7's corpus.
# 80+ linters, gocyclo=40, gci with k8s.io sections.
version: "2"

run:
  timeout: 10m

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - lll
    - nlreturn
    - wsl
  settings:
    gocyclo:
      min-complexity: 40
    gocognit:
      min-complexity: 30
    funlen:
      lines: 200
      statements: 100
    cyclop:
      max-complexity: 40
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - path: "_test\\.go$"
        linters:
          - gocyclo
          - funlen
          - dupl

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(k8s.io)
        - prefix(sigs.k8s.io)
        - prefix(k8s.io/release)
