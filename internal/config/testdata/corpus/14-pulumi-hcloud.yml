# Schema: v1. Based on pulumi/pulumi-hcloud #14 in r7's corpus.
# Autogenerated, 7 linters, revive var-naming skip.

run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - unused

linters-settings:
  revive:
    rules:
      - name: var-naming
        disabled: true
      - name: package-comments
        disabled: true
