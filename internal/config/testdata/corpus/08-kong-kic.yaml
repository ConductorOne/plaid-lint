# Schema: v2. Based on Kong/kubernetes-ingress-controller #8 in r7's corpus.
# 30 linters, forbidigo Gateway API alpha/beta, build tags.
version: "2"

run:
  timeout: 10m
  build-tags:
    - integration_tests
    - conformance_tests

linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - dogsled
    - durationcheck
    - errcheck
    - errchkjson
    - exhaustive
    - forbidigo
    - gocritic
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - misspell
    - nakedret
    - nilerr
    - nolintlint
    - paralleltest
    - predeclared
    - revive
    - rowserrcheck
    - staticcheck
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
  settings:
    forbidigo:
      forbid:
        - p: "sigs.k8s.io/gateway-api/apis/v1alpha2"
          msg: "use v1 (alpha2 has been removed)"
        - p: "sigs.k8s.io/gateway-api/apis/v1beta1"
          msg: "use v1 (beta1 will be removed soon)"
    importas:
      no-unaliased: true
      alias:
        - pkg: k8s.io/api/admission/v1
          alias: admissionv1
        - pkg: k8s.io/api/core/v1
          alias: corev1
        - pkg: sigs.k8s.io/gateway-api/apis/v1
          alias: gatewayv1
  exclusions:
    generated: strict
    paths:
      - "test/e2e/"

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
